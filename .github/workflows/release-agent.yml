name: Release SimCenter Agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@simracing/shared

      - name: Build agent
        run: npm run build --workspace=@simracing/agent

      - name: Package Windows agent
        run: |
          cd apps/agent
          npm run package:win
          Move-Item -Path "exe/agent.exe" -Destination "exe/sim-center-agent-win.exe" -Force
          Compress-Archive -Path "exe/sim-center-agent-win.exe","exe/build" -DestinationPath "exe/sim-center-agent-win.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/exe/sim-center-agent-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@simracing/shared

      - name: Build agent
        run: npm run build --workspace=@simracing/agent

      - name: Package Linux agent
        run: |
          cd apps/agent
          npx pkg . --targets node18-linux-x64 --out-path ./exe/sim-center-agent-linux

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/exe/sim-center-agent-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
