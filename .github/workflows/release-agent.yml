name: Release SimCenter Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Install agent dependencies
        run: cd agent && npm ci

      - name: Build single exe
        run: cd agent && npm run build:exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: agent/exe/sim-center-agent-win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install agent dependencies
        run: cd agent && npm ci

      - name: Build TypeScript
        run: cd agent && npm run build

      - name: Package with pkg
        run: cd agent && npx pkg . --targets node18-linux-x64 --out-path ./exe/sim-center-agent-linux

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: agent/exe/sim-center-agent-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
