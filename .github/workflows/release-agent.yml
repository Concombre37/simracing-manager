name: Release SimCenter Agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@simracing/shared

      - name: Build agent
        run: npm run build --workspace=@simracing/agent

      - name: Install 7zip
        run: choco install 7zip -y

      - name: Package Windows agent
        run: |
          cd apps/agent
          npm run package:win
          Move-Item -Path "exe/agent.exe" -Destination "exe/sim-center-agent-win.exe" -Force
          @'
          ;!@Install@!UTF-8!
          Title="SimCenter Agent"
          ExtractDialogText="Extracting SimCenter Agent..."
          ExtractPathText="Choose extraction folder:"
          GUIMode="1"
          RunProgram=""%%T\sim-center-agent-win.exe""
          ;!@InstallEnd@!
          '@ | Out-File -Encoding utf8 exe\config.txt
          $7z = "C:\Program Files\7-Zip\7z.exe"
          $sfx = "C:\Program Files\7-Zip\7zCon.sfx"
          if (-not (Test-Path $7z)) { $7z = "7z.exe"; $sfx = "7zCon.sfx" }
          if (-not (Test-Path $sfx)) { throw "SFX module not found at $sfx" }
          & $7z a -sfx"$sfx" -r -y exe\sim-center-agent-win-setup.exe exe\config.txt exe\sim-center-agent-win.exe exe\start-agent.vbs exe\build
          if (-not (Test-Path exe\sim-center-agent-win-setup.exe)) { throw "SFX not created" }
          & $7z a -tzip -r -y exe\sim-center-agent-win.zip exe\sim-center-agent-win.exe exe\start-agent.vbs exe\build
          if (-not (Test-Path exe\sim-center-agent-win.zip)) { throw "ZIP not created" }

      - name: Extract changelog section for this release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          START=$(grep -nE "^## ${TAG}( |$)" CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$START" ]; then
            echo "_Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour le détail des changements._" > release_notes.md
          else
            END=$(tail -n +"$((START+1))" CHANGELOG.md | grep -nE "^## " | head -1 | cut -d: -f1)
            if [ -z "$END" ]; then
              tail -n +"$START" CHANGELOG.md > release_notes.md
            else
              sed -n "${START},$((START+END-1))p" CHANGELOG.md > release_notes.md
            fi
          fi
          cat release_notes.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            apps/agent/exe/sim-center-agent-win-setup.exe
            apps/agent/exe/sim-center-agent-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@simracing/shared

      - name: Build agent
        run: npm run build --workspace=@simracing/agent

      - name: Package Linux agent
        run: |
          cd apps/agent
          npx pkg . --targets node18-linux-x64 --out-path ./exe
          mv ./exe/agent ./exe/sim-center-agent-linux-x64
          tar czf ./exe/sim-center-agent-linux-x64.tar.gz -C ./exe sim-center-agent-linux-x64

      - name: Extract changelog section for this release
        run: |
          TAG="${GITHUB_REF_NAME}"
          START=$(grep -nE "^## ${TAG}( |$)" CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$START" ]; then
            echo "_Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour le détail des changements._" > release_notes.md
          else
            END=$(tail -n +"$((START+1))" CHANGELOG.md | grep -nE "^## " | head -1 | cut -d: -f1)
            if [ -z "$END" ]; then
              tail -n +"$START" CHANGELOG.md > release_notes.md
            else
              sed -n "${START},$((START+END-1))p" CHANGELOG.md > release_notes.md
            fi
          fi
          cat release_notes.md

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: apps/agent/exe/sim-center-agent-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
