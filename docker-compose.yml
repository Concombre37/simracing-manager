services:
  postgres:
    image: postgres:16-alpine
    container_name: simracing-postgres
    privileged: true
    restart: unless-stopped
    environment:
      POSTGRES_USER: simracing
      POSTGRES_PASSWORD: simracing
      POSTGRES_DB: simracing
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /var/run/postgresql:rw,nosuid,size=100m
      - /tmp:rw,nosuid,size=100m
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U simracing -d simracing']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: simracing-backend
    privileged: true
    restart: unless-stopped
    ports:
      - '127.0.0.1:3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://simracing:simracing@postgres:5432/simracing?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://simracing.hytlabs.com}
    volumes:
      - blanking-media-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  blanking-media-uploads:
